<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MyDay" />
  <meta name="theme-color" content="#f9f9f8" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>MyDay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f8;
      --surface: #ffffff;
      --border: #e8e6e1;
      --border-dashed: #d0cdc7;
      --text: #1a1917;
      --text-muted: #8c8882;
      --text-light: #b5b2ad;
      --accent: #1a1917;
      --accent-fg: #ffffff;
      --destructive: #c0392b;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }

    .header {
      padding: 20px 16px 12px;
      text-align: center;
    }
    .header-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .header-logo svg { width: 28px; height: 28px; }
    .header-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      letter-spacing: -0.3px;
    }
    .header-sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 16px 14px;
    }
    .date-nav button {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      box-shadow: var(--shadow);
    }
    .date-nav button:active { background: var(--border); }
    .date-nav button svg { width: 18px; height: 18px; stroke: var(--text); stroke-width: 2; fill: none; }
    .date-text { text-align: center; }
    .date-label { font-size: 13px; font-weight: 600; }
    .date-today { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 500; margin-top: 1px; }

    .progress-card {
      margin: 0 16px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .progress-label { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.2px; }
    .progress-count { font-size: 11px; font-weight: 700; }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #eeede9;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .progress-pct { font-size: 9px; color: var(--text-muted); text-align: right; margin-top: 3px; }

    .section { margin: 0 16px 10px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
    }
    .section-emoji { font-size: 14px; }
    .section-title { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); flex: 1; }
    .section-count {
      font-size: 10px;
      color: var(--text-light);
      background: #eeede9;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 500;
    }
    .section-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      transition: background 0.1s;
      border-bottom: 1px solid var(--border);
    }
    .task-item:last-child { border-bottom: none; }
    .task-item.checked { opacity: 0.45; }

    .task-check {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid #ccc;
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: border-color 0.15s, background 0.15s;
    }
    .task-check.done { background: var(--accent); border-color: var(--accent); }
    .task-check svg { width: 13px; height: 13px; stroke: white; stroke-width: 2.5; fill: none; display: none; }
    .task-check.done svg { display: block; }

    .task-emoji { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .task-content { flex: 1; min-width: 0; }
    .task-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
    .task-item.checked .task-title { text-decoration: line-through; color: var(--text-muted); }
    .task-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
    .task-item.checked .task-subtitle { text-decoration: line-through; color: var(--text-light); }

    .task-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .task-btn {
      width: 28px; height: 28px;
      border-radius: 7px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .task-btn:active { background: #eeede9; }
    .task-btn svg { width: 14px; height: 14px; stroke: var(--text-muted); stroke-width: 1.8; fill: none; }
    .task-btn.del svg { stroke: var(--destructive); opacity: 0.7; }

    .move-menu {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      margin-left: 32px;
      flex-wrap: wrap;
    }
    .move-btn {
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s;
    }
    .move-btn:active { background: #ddd; }

    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      background: var(--surface);
      border: 1.5px dashed var(--border-dashed);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-btn:active { color: var(--text); border-color: var(--text); }
    .add-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }

    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .add-form-header { display: flex; align-items: center; margin-bottom: 12px; }
    .add-form-title { font-size: 13px; font-weight: 600; flex: 1; }
    .close-btn {
      width: 28px; height: 28px;
      border-radius: 7px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:active { background: #eee; }
    .close-btn svg { width: 16px; height: 16px; stroke: var(--text-muted); stroke-width: 2; fill: none; }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 9px 12px;
      font-size: 13px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 8px;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-light); }

    .cat-picker { display: flex; gap: 6px; margin-bottom: 12px; }
    .cat-opt {
      flex: 1;
      padding: 7px 4px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }
    .cat-opt.active { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:disabled { opacity: 0.35; }
    .btn-primary:active { opacity: 0.8; }
    .btn-secondary {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.1s;
    }
    .btn-secondary:active { background: #eee; }
    .btn-row { display: flex; gap: 8px; }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      animation: slideUp 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

    .toast {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: var(--accent-fg);
      padding: 10px 18px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .px16 { padding: 0 16px; }
    .mb10 { margin-bottom: 10px; }
  </style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// STORAGE
// ============================================================
const DB = {
  get(key) { try { return JSON.parse(localStorage.getItem('myday_' + key)) ?? null; } catch { return null; } },
  set(key, val) { try { localStorage.setItem('myday_' + key, JSON.stringify(val)); } catch {} }
};
function getChecks(date) { return DB.get('checks_' + date) || {}; }
function setChecks(date, obj) { DB.set('checks_' + date, obj); }
function getManual(date) { return DB.get('manual_' + date) || []; }
function setManual(date, arr) { DB.set('manual_' + date, arr); }
function getOverrides(date) { return DB.get('overrides_' + date) || {}; }
function setOverrides(date, obj) { DB.set('overrides_' + date, obj); }

// ============================================================
// AUTO TASKS LOGIC
// ============================================================
const FERIADOS_FIXOS = [[1,1],[21,4],[1,5],[7,9],[12,10],[2,11],[15,11],[25,12]];
const FERIADOS_MOVEIS = {
  2026: ["2026-02-16","2026-02-17","2026-04-03","2026-06-04"],
  2027: ["2027-02-08","2027-02-09","2027-03-26","2027-05-27"],
};
function getFeriados(ano) {
  const s = new Set();
  for (const [dia, mes] of FERIADOS_FIXOS) s.add(`${ano}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}`);
  (FERIADOS_MOVEIS[ano] || []).forEach(f => s.add(f));
  return s;
}
function toDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function ehDiaUtil(d) {
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return false;
  return !getFeriados(d.getFullYear()).has(toDateStr(d));
}
function proximoDiaUtil(d) { let cur = new Date(d); while (!ehDiaUtil(cur)) cur = addDays(cur, 1); return cur; }
function primeiroDiaUtilDoMes(mes, ano) { return proximoDiaUtil(new Date(ano, mes-1, 1)); }
function getDataVencimento(diaOriginal, mes, ano) {
  const ultimoDia = new Date(ano, mes, 0).getDate();
  return new Date(ano, mes-1, Math.min(diaOriginal, ultimoDia));
}

const CONTAS = [
  { nome:"Brasil Card Re", dia:10, regra:"util", saz:null },
  { nome:"Brasil Card Carol", dia:10, regra:"util", saz:null },

];

function contaAtivaNoMes(c, mes, ano) {
  if (!c.saz) return true;
  const [ini, fim] = c.saz;
  if (c.nome === "Taxa Licença Prefeitura" && ano > 2026) return false;
  if (ini <= fim) return mes >= ini && mes <= fim;
  return mes >= ini || mes <= fim;
}
function contasDoDia(dateStr) {
  const d = parseDate(dateStr);
  const mes = d.getMonth()+1, ano = d.getFullYear();
  const res = [];
  for (const c of CONTAS) {
    if (!contaAtivaNoMes(c, mes, ano)) continue;
    const orig = getDataVencimento(c.dia, mes, ano);
    const venc = c.regra === 'fixo' ? orig : proximoDiaUtil(orig);
    if (toDateStr(d) === toDateStr(venc)) res.push(c.nome);
  }
  return res;
}

const METAS_PESO = {
  "2026-01-13":91.00,"2026-01-20":90.45,"2026-01-27":89.91,
  "2026-02-03":89.38,"2026-02-10":88.85,"2026-02-17":88.34,"2026-02-24":87.83,

  "2026-08-04":81.62,"2026-08-11":81.24,"2026-08-18":80.87,"2026-08-25":80.51,

  "2026-10-06":78.49,"2026-10-13":78.18,"2026-10-20":77.79,"2026-10-27":77.48,
  "2026-11-03":77.18,"2026-11-10":76.89,"2026-11-17":76.60,"2026-11-24":76.32,
  "2026-12-01":76.04,"2026-12-08":75.77,"2026-12-15":75.51,"2026-12-22":75.25,"2026-12-29":75.00,
};

function getAutoTasks(dateStr) {
  const d = parseDate(dateStr);
  const dow = d.getDay();
  const mes = d.getMonth()+1, ano = d.getFullYear();
  const isFds = dow === 0 || dow === 6;
  const tasks = [];

  if (!isFds) tasks.push({ key:"video_carol", title:"Vídeo Carol", category:"morning", emoji:"🎬", subtitle:"Edição + postagem até 11h (se urgente) ou pauta/gravação" });
  tasks.push({ key:"video_renan", title:"Vídeo Renan", category:"morning", emoji:"📱", subtitle:"Vídeo curto (~1h) - Reels/TikTok" });
  if (!isFds) tasks.push({ key:"criacao_pauta", title:"Criação de Pauta", category:"morning", emoji:"📝", subtitle:"~1 hora de criação de pauta" });
  if (!isFds) tasks.push({ key:"entregas_loja", title:"Entregas da Loja", category:"afternoon", emoji:"📦", subtitle:"Pedidos antes das 11h = entrega no mesmo dia" });
  if (dow === 2) tasks.push({ key:"pilates_carol", title:"Pilates da Carol", category:"afternoon", emoji:"🧘", subtitle:"15:30 - 16:20 (levar e já começar encomendas)" });
  tasks.push({ key:"exercicio", title:"Exercício Físico", category:"evening", emoji:"🏋️", subtitle:"Treino após voltar da loja" });
  tasks.push({ key:"afazeres_casa", title:"Afazeres de Casa", category:"evening", emoji:"🧹", subtitle:"1 hora após o banho pós-treino" });
  tasks.push({ key:"lazer", title:"Lazer", category:"evening", emoji:"🎮", subtitle:"1-2 horas de descanso" });

  if (dow === 2) {
    const meta = METAS_PESO[dateStr];
    if (meta) {
      const semAnt = toDateStr(addDays(d,-7));
      const metaAnt = METAS_PESO[semAnt];
      let sub = `Meta: ${meta.toFixed(2)} kg`;
      if (metaAnt) { const diff = meta - metaAnt; sub += ` (${diff>0?'+':''}${diff.toFixed(2)} kg vs semana passada)`; }
      tasks.push({ key:"peso_terca", title:"Dia de Pesar", category:"reminders", emoji:"⚖️", subtitle:sub });
    }
  }

  if (toDateStr(d) === toDateStr(primeiroDiaUtilDoMes(mes, ano)))
    tasks.push({ key:"nfe_marcos", title:"Enviar NFe para Marcos Contador", category:"reminders", emoji:"📧", subtitle:"Primeiro dia útil do mês" });

  if (toDateStr(d) === toDateStr(getDataVencimento(5, mes, ano)))
    tasks.push({ key:"nota_youtube", title:"Emitir Nota do YouTube", category:"reminders", emoji:"📄", subtitle:"Todo dia 5" });

  if (dow === 5)
    tasks.push({ key:"pagar_pai", title:"Pagar meu Pai", category:"reminders", emoji:"🧍🏾‍♂️", subtitle:"Toda sexta-feira" });

  if (isFds)
    tasks.push({ key:"fds_nota", title:dow===6?"Sábado":"Domingo", category:"reminders", emoji:"🏠", subtitle:"Sem vídeo longo e sem entregas (apenas vídeo curto 1h)" });

  const contas = contasDoDia(dateStr);
  for (const c of contas)
    tasks.push({ key:'conta_'+c.toLowerCase().replace(/[^a-z0-9]/g,'_'), title:c, category:"bills", emoji:"💳" });

  return tasks;
}

function getCategoryLabel(cat) {
  const map = { morning:{label:"Manhã",emoji:"🌅"}, afternoon:{label:"Tarde",emoji:"☀️"}, evening:{label:"Noite",emoji:"🌙"}, bills:{label:"Contas do Dia",emoji:"💰"}, reminders:{label:"Lembretes",emoji:"📋"}, extra:{label:"Extras",emoji:"➕"} };
  return map[cat] || { label:"Extras", emoji:"➕" };
}

function formatDateBR(dateStr) {
  const d = parseDate(dateStr);
  const dias = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
  return `${dias[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function getTodayStr() {
  const now = new Date();
  const offset = now.getTimezoneOffset() + (-3 * 60);
  const br = new Date(now.getTime() + offset * 60000);
  return toDateStr(br);
}

// ============================================================
// STATE
// ============================================================
let state = {
  date: getTodayStr(),
  checks: {}, manualTasks: [], overrides: {},
  showAddForm: false, newTitle: '', newDesc: '', newCat: 'extra',
  editTask: null, openMoveMenuKey: null,
};
function loadDateData() {
  state.checks = getChecks(state.date);
  state.manualTasks = getManual(state.date);
  state.overrides = getOverrides(state.date);
}
loadDateData();

// ============================================================
// SVG ICONS
// ============================================================
const I = {
  chevL: `<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>`,
  chevR: `<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`,
  check: `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
  plus:  `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  pencil:`<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash: `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
  arrow: `<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`,
  x:     `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  cal:   `<svg viewBox="0 0 32 32" fill="none"><rect x="3" y="5" width="26" height="24" rx="4" fill="#1a1917"/><rect x="5" y="13" width="22" height="14" rx="2" fill="white"/><rect x="9" y="2" width="3" height="7" rx="1.5" fill="#1a1917"/><rect x="20" y="2" width="3" height="7" rx="1.5" fill="#1a1917"/><rect x="9" y="19" width="4" height="4" rx="1" fill="#1a1917" opacity="0.3"/><rect x="14" y="19" width="4" height="4" rx="1" fill="#1a1917" opacity="0.3"/><rect x="19" y="19" width="4" height="4" rx="1" fill="#1a1917" opacity="0.3"/></svg>`,
};

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============================================================
// RENDER
// ============================================================
function renderTaskItem(task, isChecked, isManual, showMove) {
  const movableCats = ['morning','afternoon','evening'];
  const canMove = movableCats.includes(task.category);
  const others = movableCats.filter(c => c !== task.category);
  const catLabels = { morning:'🌅 Manhã', afternoon:'☀️ Tarde', evening:'🌙 Noite' };
  return `
    <div class="task-item${isChecked?' checked':''}">
      <button class="task-check${isChecked?' done':''}" onclick="toggleCheck('${task.key}')">${I.check}</button>
      <span class="task-emoji">${task.emoji}</span>
      <div class="task-content">
        <div class="task-title">${esc(task.title)}</div>
        ${task.subtitle?`<div class="task-subtitle">${esc(task.subtitle)}</div>`:''}
      </div>
      <div class="task-actions">
        ${isManual?`<button class="task-btn" onclick="openEdit(${task.id})">${I.pencil}</button>`:''}
        ${isManual?`<button class="task-btn del" onclick="deleteTask(${task.id})">${I.trash}</button>`:''}
        ${canMove&&!isChecked?`<button class="task-btn" onclick="toggleMoveMenu('${task.key}')">${I.arrow}</button>`:''}
      </div>
    </div>
    ${showMove?`<div class="move-menu">${others.map(c=>`<button class="move-btn" onclick="moveTask('${task.key}','${isManual?'manual':'auto'}',${isManual?task.id:'null'},'${c}')">${catLabels[c]}</button>`).join('')}</div>`:''}
  `;
}

function renderSection(cat, tasks) {
  if (!tasks.length) return '';
  const { label, emoji } = getCategoryLabel(cat);
  const done = tasks.filter(t => state.checks[t.key]).length;
  return `
    <div class="section mb10">
      <div class="section-header">
        <span class="section-emoji">${emoji}</span>
        <span class="section-title">${label}</span>
        <span class="section-count">${done}/${tasks.length}</span>
      </div>
      <div class="section-body">
        ${tasks.map(t => renderTaskItem(t, !!state.checks[t.key], !!t.isManual, state.openMoveMenuKey===t.key)).join('')}
      </div>
    </div>
  `;
}

function getAllTasks() {
  const auto = getAutoTasks(state.date).map(t => {
    const ov = state.overrides[t.key];
    return ov ? {...t, category:ov} : t;
  });
  const manual = state.manualTasks.map(m => ({
    key:'manual_'+m.id, title:m.title, subtitle:m.description||undefined,
    category:m.category, emoji:'📌', isManual:true, id:m.id,
  }));
  return [...auto, ...manual];
}

function render() {
  const isToday = state.date === getTodayStr();
  const all = getAllTasks();
  const done = all.filter(t => state.checks[t.key]).length;
  const pct = all.length > 0 ? Math.round((done/all.length)*100) : 0;
  const ORDER = ['morning','afternoon','evening','reminders','bills','extra'];
  const groups = Object.fromEntries(ORDER.map(c=>[c,[]]));
  for (const t of all) (groups[t.category] ? groups[t.category] : groups.extra).push(t);

  const addHTML = state.showAddForm ? `
    <div class="add-form mb10">
      <div class="add-form-header">
        <span class="add-form-title">Nova tarefa</span>
        <button class="close-btn" onclick="setShowAdd(false)">${I.x}</button>
      </div>
      <input type="text" id="new-title" placeholder="Título da tarefa..." value="${esc(state.newTitle)}" oninput="state.newTitle=this.value" onkeydown="if(event.key==='Enter')addTask()" />
      <input type="text" id="new-desc" placeholder="Descrição (opcional)..." value="${esc(state.newDesc)}" oninput="state.newDesc=this.value" onkeydown="if(event.key==='Enter')addTask()" />
      <div class="cat-picker">
        ${[['morning','🌅 Manhã'],['afternoon','☀️ Tarde'],['evening','🌙 Noite'],['extra','➕ Extra']].map(([v,l])=>`<button class="cat-opt${state.newCat===v?' active':''}" onclick="setNewCat('${v}')">${l}</button>`).join('')}
      </div>
      <button class="btn-primary" onclick="addTask()" ${!state.newTitle.trim()?'disabled':''}>Adicionar</button>
    </div>
  ` : `<button class="add-btn mb10" onclick="setShowAdd(true)">${I.plus} Adicionar tarefa</button>`;

  const editHTML = state.editTask ? `
    <div class="modal-overlay" onclick="closeEditOnOverlay(event)">
      <div class="modal">
        <div class="modal-title">Editar tarefa</div>
        <input type="text" id="edit-title" placeholder="Título..." value="${esc(state.editTask.title)}" oninput="state.editTask.title=this.value" onkeydown="if(event.key==='Enter')saveEdit()" />
        <input type="text" id="edit-desc" placeholder="Descrição (opcional)..." value="${esc(state.editTask.description||'')}" oninput="state.editTask.description=this.value" onkeydown="if(event.key==='Enter')saveEdit()" />
        <div class="btn-row">
          <button class="btn-secondary" onclick="state.editTask=null;render()">Cancelar</button>
          <button class="btn-primary" style="flex:1" onclick="saveEdit()" ${!state.editTask.title.trim()?'disabled':''}>Salvar</button>
        </div>
      </div>
    </div>
  ` : '';

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-logo">${I.cal}<span class="header-title">MyDay</span></div>
      <div class="header-sub">Organize seu dia de forma simples</div>
    </div>
    <div class="date-nav">
      <button onclick="navigate(-1)">${I.chevL}</button>
      <div class="date-text">
        <div class="date-label">${formatDateBR(state.date)}</div>
        ${isToday?'<div class="date-today">Hoje</div>':''}
      </div>
      <button onclick="navigate(1)">${I.chevR}</button>
    </div>
    <div class="progress-card">
      <div class="progress-header">
        <span class="progress-label">Progresso do dia</span>
        <span class="progress-count">${done}/${all.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-pct">${pct}%</div>
    </div>
    <div class="px16">
      ${ORDER.map(c => renderSection(c, groups[c])).join('')}
      ${addHTML}
    </div>
    ${editHTML}
  `;
}

// ============================================================
// ACTIONS
// ============================================================
function navigate(delta) {
  state.date = toDateStr(addDays(parseDate(state.date), delta));
  state.openMoveMenuKey = null; state.showAddForm = false;
  loadDateData(); render();
}
function toggleCheck(key) {
  state.checks[key] = !state.checks[key];
  setChecks(state.date, state.checks);
  state.openMoveMenuKey = null; render();
  if (state.checks[key]) showToast('✓ Tarefa concluída');
}
function toggleMoveMenu(key) { state.openMoveMenuKey = state.openMoveMenuKey===key?null:key; render(); }
function moveTask(key, type, manualId, newCat) {
  if (type==='manual') {
    const tasks = getManual(state.date);
    const idx = tasks.findIndex(t=>t.id===manualId);
    if (idx!==-1) { tasks[idx].category=newCat; setManual(state.date,tasks); state.manualTasks=tasks; }
  } else {
    state.overrides[key]=newCat; setOverrides(state.date,state.overrides);
  }
  state.openMoveMenuKey=null; render(); showToast('Tarefa movida');
}
function setShowAdd(val) {
  state.showAddForm=val;
  if (!val) { state.newTitle=''; state.newDesc=''; state.newCat='extra'; }
  render();
  if (val) setTimeout(()=>document.getElementById('new-title')?.focus(),50);
}
function setNewCat(cat) { state.newCat=cat; render(); setTimeout(()=>document.getElementById('new-title')?.focus(),10); }
function addTask() {
  const title = state.newTitle.trim();
  if (!title) return;
  const tasks = getManual(state.date);
  const id = Date.now();
  tasks.push({ id, title, description:state.newDesc.trim()||null, category:state.newCat });
  setManual(state.date,tasks); state.manualTasks=tasks;
  state.showAddForm=false; state.newTitle=''; state.newDesc=''; state.newCat='extra';
  render(); showToast('Tarefa adicionada');
}
function openEdit(id) {
  const task = state.manualTasks.find(t=>t.id===id);
  if (!task) return;
  state.editTask = { id, title:task.title, description:task.description||'' };
  render(); setTimeout(()=>document.getElementById('edit-title')?.focus(),50);
}
function saveEdit() {
  if (!state.editTask||!state.editTask.title.trim()) return;
  const tasks = getManual(state.date);
  const idx = tasks.findIndex(t=>t.id===state.editTask.id);
  if (idx!==-1) { tasks[idx].title=state.editTask.title.trim(); tasks[idx].description=state.editTask.description?.trim()||null; setManual(state.date,tasks); state.manualTasks=tasks; }
  state.editTask=null; render(); showToast('Tarefa atualizada');
}
function closeEditOnOverlay(e) { if (e.target.classList.contains('modal-overlay')) { state.editTask=null; render(); } }
function deleteTask(id) {
  const tasks = getManual(state.date).filter(t=>t.id!==id);
  setManual(state.date,tasks); state.manualTasks=tasks;
  const key='manual_'+id;
  if (state.checks[key]) { delete state.checks[key]; setChecks(state.date,state.checks); }
  render(); showToast('Tarefa removida');
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

render();
</script>

<script>
// Register Service Worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}
</script>
</body>
</html>
